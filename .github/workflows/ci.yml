name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      - name: Run syntax check
        run: |
          python -m py_compile api_server.py core_graph.py rag_db.py test_client.py config.py logging_config.py prompt_loader.py tools.py
          python -m py_compile review_directory.py report_exporter.py ingest_rules.py evals/run_evals.py
          python -m py_compile report_store.py migrate_reports.py

      - name: Run tests
        run: pytest -q

      - name: Run lightweight evals
        run: python evals/run_evals.py --min-pass-rate 0.8

      - name: Migrate reports smoke check
        run: python migrate_reports.py

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Frontend audit
        working-directory: frontend
        run: npm audit

      - name: Frontend type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Playwright E2E smoke
        env:
          AUTH_ENABLED: "false"
          RATE_LIMIT_ENABLED: "false"
          VITE_API_BASE_URL: http://127.0.0.1:8000
        run: |
          python -m uvicorn api_server:app --host 127.0.0.1 --port 8000 &
          sleep 5
          cd frontend
          npm run e2e:smoke
